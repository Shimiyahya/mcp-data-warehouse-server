name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Lint + format check
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Build the synthetic warehouse
        run: uv run python scripts/seed.py

      - name: Run tests
        run: uv run pytest -q

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint the chart
        run: helm lint deploy/helm/mcp-data-warehouse

      - name: Render templates as a sanity check
        run: helm template ci deploy/helm/mcp-data-warehouse > /dev/null

  # Builds the image on every push; pushes to GHCR only on version tags,
  # gated on tests and chart lint. The chart's default image.repository
  # points at this GHCR image, which is what makes a fresh-machine
  # `helm install` work.
  docker:
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build (push on version tags only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
